<body>

  </nav>

  <main class="main-content">
    <div class="container">
      <section class="page-hero page-hero-grid">
        <div class="page-copy reveal">
          <p class="section-tag">Contact</p>
          <h1 class="page-title">联系我</h1>
          <p class="page-lead">
            如果你在寻找兼具商业感、执行力和技术理解的人，欢迎通过邮件、电话或表单联系我。
          </p>
          <div class="chip-list">
            <span>商业分析</span>
            <span>运营增长</span>
            <span>技术协同</span>
            <span>项目推进</span>
          </div>
        </div>

        <div class="contact-photo-card reveal">
          <img src="assets/profile.jpg" alt="古海霖证件照" class="contact-photo">
        </div>
      </section>

      <section class="contact-layout">
        <div class="contact-stack stagger-children">
          <a href="mailto:hailingu1016@qq.com" class="contact-card">
            <div class="contact-icon">@</div>
            <div>
              <div class="contact-label">邮箱</div>
              <div class="contact-value">hailingu1016@qq.com</div>
            </div>
          </a>

          <a href="tel:44889011" class="contact-card">
            <div class="contact-icon">PH</div>
            <div>
              <div class="contact-label">电话</div>
              <div class="contact-value">44889011</div>
            </div>
          </a>

          <a href="assets/%E5%8F%A4%E6%B5%B7%E9%9C%96%E7%AE%80%E5%8E%862026.pdf" class="contact-card">
            <div class="contact-icon">CV</div>
            <div>
              <div class="contact-label">简历</div>
              <div class="contact-value">下载 2026 版简历</div>
            </div>
          </a>
        </div>

        <div class="contact-form-card reveal">
          <h3>发送一条消息</h3>
          <form class="contact-form" id="contactForm">
            <div class="form-group">
              <label for="name">姓名</label>
              <input type="text" id="name" name="name" placeholder="请输入你的姓名" required>
            </div>

            <div class="form-group">
              <label for="email">邮箱</label>
              <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
            </div>

            <div class="form-group">
              <label for="message">内容</label>
              <textarea id="message" name="message" placeholder="请简单描述岗位、合作方向或项目需求" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary form-submit">发送消息</button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <p>古海霖 / 商业分析、AI 学习、运营增长与技术执行。</p>
